<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Caricamento Torneo...</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Questi sono i colori base di emergenza. Verranno SOVRASCRITTI in automatico dal Database! */
    --green: #d32f2f;       
    --green-dark: #b71c1c;  
    --yellow: #d4af37;      
    --red: #ff1744;         
    
    --bg: #0a0a0c;          /* SFONDO GENERALE SCURO */
    --surface: #141417;     /* Superfici intermedie */
    --card: #1c1c22;        /* Schede e tabelle */
    --border: #2c2c35;      /* Linee e bordi */
    --text: #ffffff;        /* Testi principali */
    --muted: #a0a0ab;       /* Testi secondari */
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; max-width: 480px; margin: 0 auto; overflow-x: hidden; }

  .header { background: var(--surface); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-spacer { width: 40px; } 
  .header-logo { height: 45px; max-width: 200px; object-fit: contain; display: none; }
  .auth-btn { background: var(--card); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; color: var(--text); }
  
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 78px; z-index: 99; }
  .tab { flex: 1; text-align: center; padding: 12px 5px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .screen { display: none; padding: 0 20px 20px 20px; }
  .screen.active { display: block; }
  
  .day-nav { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; background: var(--surface); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
  .nav-arrow { background: var(--card); border: 1px solid var(--green); color: var(--green); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 18px; user-select: none; transition: 0.2s;}
  .nav-arrow:active { transform: scale(0.9); }
  .nav-arrow.disabled { opacity: 0.2; border-color: var(--muted); color: var(--muted); pointer-events: none; }
  .header-date { font-size: 18px; color: var(--text); font-weight: bold; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; text-align: center; flex: 1;}

  .section-title { font-size: 14px; font-weight: 600; color: var(--green); margin-top: 25px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
  
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; position: relative; }
  .match-card.done { border-color: var(--border); opacity: 0.8; }
  .match-time { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;}
  .teams-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .team-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; flex: 1; color: var(--text); }
  .team-name.right { text-align: right; }
  .vs-badge { background: var(--border); color: var(--muted); font-family: 'Bebas Neue', sans-serif; padding: 4px 10px; border-radius: 6px; }
  .score-badge { background: var(--green); color: #ffffff; font-family: 'Bebas Neue', sans-serif; font-size: 18px; padding: 4px 12px; border-radius: 6px; }
  
  .live-badge { background: var(--red); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; animation: pulse 1.5s infinite; letter-spacing: 0.5px; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  .scorers-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 10px; gap: 15px; line-height: 1.6; }
  .scorer-left { text-align: left; flex: 1; }
  .scorer-right { text-align: right; flex: 1; }
  .match-note { font-size: 11px; color: var(--yellow); margin-top: 12px; text-align: center; font-style: italic; background: rgba(214, 175, 55, 0.1); padding: 6px; border-radius: 6px; font-weight: 600;}

  .edit-btn { display: inline-block; background: #1a1010; color: var(--green); font-size: 11px; font-weight: 600; padding: 8px 12px; border-radius: 6px; margin-top: 15px; cursor: pointer; border: 1px solid var(--green); text-align: center; width: 100%; text-transform: uppercase;}
  
  .girone-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 15px; margin-bottom: 20px; }
  .girone-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green); letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px;}
  
  .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px;}
  table { width: 100%; border-collapse: collapse; text-align: center; }
  th { background: #1a1a22; color: var(--muted); font-size: 11px; font-weight: 600; padding: 12px 8px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; padding-left: 15px; }
  td { padding: 12px 8px; font-size: 14px; border-bottom: 1px solid #22222a; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  .pt { font-weight: bold; color: var(--green); font-size: 16px; }

  .history-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 8px; padding: 12px; margin-bottom: 10px;}
  .history-date { font-size: 10px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between;}
  .history-score { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); }

  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  input[type="number"], textarea, select { width: 100%; background: #0d0d11; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; appearance: none; cursor: pointer; }
  input[type="number"]:focus, textarea:focus, select:focus { border-color: var(--green); }
  textarea { resize: none; min-height: 70px; }
  
  .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px;}
  .btn-primary { background: var(--green); color: #ffffff; }
  .back-btn { color: var(--muted); font-size: 14px; cursor: pointer; margin-top: 20px; margin-bottom: 20px; display: inline-block; }
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .score-row .team-label { flex: 1; text-align: center; font-size: 12px; font-weight: 600; color: var(--muted); }
  .score-input { width: 70px !important; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 36px !important; padding: 10px 8px !important; background: #0d0d11 !important; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: var(--muted); text-align: center; padding: 20px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px;}
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #ffffff; padding: 12px 24px; border-radius: 100px; font-weight: 600; font-size: 14px; transition: transform 0.3s; z-index: 999; box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
  .toast.error { background: var(--red); color: #fff; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-spacer"></div>
  <img src="" alt="Logo Torneo" class="header-logo" id="mainLogo">
  <div class="auth-btn" id="lockBtn" onclick="toggleAuth()">🔒</div>
</div>

<div class="tabs" id="mainTabs" style="display:none;">
  <div class="tab active" id="tab-partite" onclick="switchTab('homeScreen')">⚽ PARTITE</div>
  <div class="tab" id="tab-classifica" onclick="switchTab('classificaScreen')">🏆 CLASSIFICHE</div>
  <div class="tab" id="tab-marcatori" onclick="switchTab('marcatoriScreen')">👟 MARCATORI</div>
</div>

<div class="toast" id="toast"></div>

<div id="initialLoader" class="loading">
  <div class="spinner" id="mainSpinner"></div>
  <h2 id="loaderText" style="color:var(--text); margin-top:10px;">Connessione al database...</h2>
  <p id="loaderSubText" style="font-size:12px; margin-top:10px;">Attendi pochi istanti</p>
</div>

<div class="screen" id="homeScreen">
  <div class="day-nav" id="dayNav" style="display:none;">
    <div class="nav-arrow" id="prevArrow" onclick="changeDay(-1)">◀</div>
    <div class="header-date" id="headerDate">CARICAMENTO...</div>
    <div class="nav-arrow" id="nextArrow" onclick="changeDay(1)">▶</div>
  </div>
  <div id="matchesList"></div>
</div>

<div class="screen" id="classificaScreen">
  <div class="section-title">Classifiche</div>
  <div id="gironiContainer"></div>
  <div class="section-title" id="titleFaseFinale" style="margin-top:30px; color:var(--yellow);">Fase Finale</div>
  <div id="knockoutContainer"></div>
  <div class="section-title" style="margin-top:30px;">Storico Partite</div>
  <div id="historyList"></div>
</div>

<div class="screen" id="marcatoriScreen">
  <div class="section-title">Classifica Marcatori</div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Giocatore</th>
          <th>⚽ GOL</th>
        </tr>
      </thead>
      <tbody id="marcatoriBody"></tbody>
    </table>
  </div>
</div>

<div class="screen" id="resultScreen">
  <div class="back-btn" onclick="switchTab('homeScreen')">← Annulla e torna indietro</div>

  <div class="section-title" style="text-align:center; font-size:22px; color:var(--green);" id="resultTeams"></div>
  <div style="text-align:center; font-size:12px; color:var(--muted); margin-bottom:20px;" id="resultOrario"></div>

  <div class="input-group">
    <label>STATO PARTITA</label>
    <select id="matchStatus">
      <option value="DA_GIOCARE">🕒 Da Giocare</option>
      <option value="LIVE">🔴 In Corso (LIVE)</option>
      <option value="TERMINATA">✅ Terminata</option>
    </select>
  </div>

  <div class="score-row">
    <div class="team-label" id="scoreTeamA">SQ A</div>
    <input type="number" class="score-input" id="scoreA" min="0" max="99" inputmode="numeric">
    <div style="font-family: 'Bebas Neue'; font-size: 36px; color: var(--muted);">-</div>
    <input type="number" class="score-input" id="scoreB" min="0" max="99" inputmode="numeric">
    <div class="team-label" id="scoreTeamB">SQ B</div>
  </div>

  <div class="input-group">
    <label id="marcatoriLabelA">MARCATORI A (uno per riga, es. Mario x2)</label>
    <textarea id="marcatoriA"></textarea>
  </div>
  <div class="input-group">
    <label id="marcatoriLabelB">MARCATORI B (uno per riga, es. Mario x2)</label>
    <textarea id="marcatoriB"></textarea>
  </div>
  <div class="input-group">
    <label>NOTE (Cartellini, vittoria ai rigori, infortuni...)</label>
    <textarea id="notePartita"></textarea>
  </div>

  <button class="btn btn-primary" onclick="submitResult()" id="submitBtn">📤 SALVA RISULTATO</button>
</div>

<script>
// ============================================================
// CONFIGURAZIONE SUPABASE
// ============================================================
const SUPABASE_URL = "https://rrtpbmdwvgpesqkkdjxr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJydHBibWR3dmdwZXNxa2tkanhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjE0ODAsImV4cCI6MjA5NzI5NzQ4MH0.HD8thcDsFSBZPrSQGSdO50wDJGmqtDxTKErJeOx7Xzc";
// ============================================================

const HEADERS = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };

let currentTorneo = null;
let allMatches = [];      
let allTeams = [];
let uniqueDates = [];     
let currentDateIndex = 0; 
let matches = [];         
let currentMatch = null;
let adminPin = sessionStorage.getItem('adminPin') || null;

document.addEventListener('DOMContentLoaded', () => {
  setupSwipe();
  inizializzaApp();
});

// FUNZIONE CHIAVE: Legge l'URL e carica il torneo corretto
function inizializzaApp() {
  const urlParams = new URLSearchParams(window.location.search);
  const slug = urlParams.get('t'); // Cerca ?t=slug nell'URL

  if (!slug) {
    mostraErrore("Nessun torneo selezionato", "Assicurati di usare il link corretto fornito dall'organizzatore (es: miosito.com/?t=codice)");
    return;
  }

  // 1. Scarica i dati del torneo
  fetch(`${SUPABASE_URL}/rest/v1/tornei?slug=eq.${slug}`, { headers: HEADERS })
    .then(res => res.json())
    .then(data => {
      if (data.length === 0) {
        mostraErrore("Torneo non trovato", "Il codice torneo inserito non è valido.");
        return;
      }
      currentTorneo = data[0];
      
      // Imposta Colori e Titoli dinamici
      document.documentElement.style.setProperty('--green', currentTorneo.colore_primario);
      document.documentElement.style.setProperty('--yellow', currentTorneo.colore_secondario);
      document.title = currentTorneo.nome;
      
      if(currentTorneo.logo_url) {
        const logo = document.getElementById('mainLogo');
        logo.src = currentTorneo.logo_url;
        logo.style.display = 'block';
      }

      // 2. Scarica Squadre e Partite in parallelo
      return Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/squadre?torneo_id=eq.${currentTorneo.id}`, { headers: HEADERS }).then(r=>r.json()),
        fetch(`${SUPABASE_URL}/rest/v1/partite?torneo_id=eq.${currentTorneo.id}`, { headers: HEADERS }).then(r=>r.json())
      ]);
    })
    .then(([squadre, partite]) => {
      if(!squadre || !partite) return; 
      
      allTeams = squadre;
      allMatches = partite;
      
      document.getElementById('initialLoader').style.display = 'none';
      document.getElementById('mainTabs').style.display = 'flex';
      
      updateAuthIcon();
      processDates();
      switchTab('homeScreen'); 
    })
    .catch(err => mostraErrore("Errore di Rete", "Impossibile collegarsi al server Supabase."));
}

function mostraErrore(titolo, sottotitolo) {
  document.getElementById('mainSpinner').style.display = 'none';
  document.getElementById('loaderText').textContent = titolo;
  document.getElementById('loaderText').style.color = 'var(--red)';
  document.getElementById('loaderSubText').textContent = sottotitolo;
}

// --- LOGICA GESTIONE DATE E CALENDARIO ---
function processDates() {
  let datesSet = new Set(allMatches.map(m => m.data ? m.data.trim() : "").filter(d => d !== ""));
  uniqueDates = Array.from(datesSet);
  
  uniqueDates.sort((a, b) => {
    let partsA = a.includes('/') ? a.split('/') : a.split('-');
    let partsB = b.includes('/') ? b.split('/') : b.split('-');
    if(partsA.length < 2) return 1; if(partsB.length < 2) return -1;
    let yA = partsA[2] ? parseInt(partsA[2]) : new Date().getFullYear();
    let yB = partsB[2] ? parseInt(partsB[2]) : new Date().getFullYear();
    return new Date(yA, parseInt(partsA[1])-1, parseInt(partsA[0])) - new Date(yB, parseInt(partsB[1])-1, parseInt(partsB[0]));
  });

  if (uniqueDates.length === 0) {
    document.getElementById('matchesList').innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--muted);">Il calendario non è ancora disponibile.</div>`;
    return;
  }

  let now = new Date(); now.setHours(0,0,0,0);
  let nextIdx = uniqueDates.findIndex(d => {
    let parts = d.includes('/') ? d.split('/') : d.split('-');
    if(parts.length < 2) return true; 
    let y = parts[2] ? parseInt(parts[2]) : now.getFullYear();
    return new Date(y, parseInt(parts[1])-1, parseInt(parts[0])) >= now;
  });

  currentDateIndex = nextIdx !== -1 ? nextIdx : uniqueDates.length - 1;
  document.getElementById('dayNav').style.display = 'flex';
  renderCurrentDay();
}

function formatDisplayDate(dateStr) {
  if(!dateStr) return "DATA TBD";
  let parts = dateStr.includes('/') ? dateStr.split('/') : dateStr.split('-');
  if (parts.length < 2) return dateStr;
  let y = parts[2] ? parseInt(parts[2]) : new Date().getFullYear();
  return new Date(y, parseInt(parts[1])-1, parseInt(parts[0])).toLocaleDateString('it-IT', { weekday: 'short', day: '2-digit', month: 'short' }).toUpperCase();
}

function changeDay(offset) {
  let newIdx = currentDateIndex + offset;
  if (newIdx >= 0 && newIdx < uniqueDates.length) { currentDateIndex = newIdx; renderCurrentDay(); }
}

function renderCurrentDay() {
  if (uniqueDates.length === 0) return;

  const targetDateStr = uniqueDates[currentDateIndex];
  document.getElementById('headerDate').textContent = formatDisplayDate(targetDateStr);
  document.getElementById('prevArrow').classList.toggle('disabled', currentDateIndex === 0);
  document.getElementById('nextArrow').classList.toggle('disabled', currentDateIndex === uniqueDates.length - 1);

  matches = allMatches.filter(m => m.data === targetDateStr);
  const list = document.getElementById('matchesList');
  
  if (matches.length === 0) { list.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--muted);">Nessuna partita programmata.</div>`; return; }

  list.innerHTML = matches.map((m, i) => {
    const hasScore = (m.gol_a !== "" && m.gol_b !== "" && m.gol_a !== null); 
    const isTerminata = (m.stato === 'TERMINATA');
    const isLive = (m.stato === 'LIVE');

    let badgeText = currentTorneo.formato === 'UNICO' ? `CAMPIONATO` : `GIRONE ${m.girone_fase}`;
    if (!['A','B','C','D','UNICO','CAMPIONATO'].includes(m.girone_fase.toUpperCase())) badgeText = m.girone_fase; 

    let isKnockout = !['A','B','C','D','UNICO','CAMPIONATO'].includes(m.girone_fase.toUpperCase());
    let badgeColor = isKnockout ? "var(--yellow)" : "var(--green)";

    let gironeBadge = `<span style="background:var(--surface); border:1px solid ${badgeColor}; font-size:10px; padding:3px 8px; border-radius:4px; color:${badgeColor}; font-weight:bold;">${badgeText}</span>`;
    
    let timeDisplay = `<span>🕒 ${m.orario || 'TBD'}</span>`;
    if (isLive) timeDisplay = `<span class="live-badge">🔴 LIVE</span>`;
    else if (isTerminata) timeDisplay = `<span style="color:var(--muted);">✅ Finita</span>`;

    let scorersHtml = '';
    if (hasScore && (m.marcatori_a || m.marcatori_b)) {
      scorersHtml = `
      <div class="scorers-row">
        <div class="scorer-left">${formatMarcatori(m.marcatori_a, 'A')}</div>
        <div class="scorer-right">${formatMarcatori(m.marcatori_b, 'B')}</div>
      </div>`;
    }

    let noteHtml = (hasScore && m.note) ? `<div class="match-note">📌 ${m.note.replace(/\n/g, '<br>')}</div>` : '';
    let editHtml = adminPin ? `<div class="edit-btn" onclick="openMatch(${i})">✏️ Modifica</div>` : '';

    return `
    <div class="match-card ${isTerminata ? 'done' : ''}">
      <div class="match-time">${gironeBadge}${timeDisplay}</div>
      <div class="teams-row">
        <div class="team-name">${m.squadra_a}</div>
        ${hasScore ? `<div class="score-badge">${m.gol_a} - ${m.gol_b}</div>` : `<div class="vs-badge">VS</div>`}
        <div class="team-name right">${m.squadra_b}</div>
      </div>
      ${scorersHtml}${noteHtml}${editHtml}
    </div>`;
  }).join('');
}

// --- LOGICA CLASSIFICHE CALCOLATA IN LOCALE ---
function loadStandings() {
  document.getElementById('gironiContainer').innerHTML = '';
  document.getElementById('knockoutContainer').innerHTML = '';
  document.getElementById('historyList').innerHTML = '';

  let groups = {};
  allTeams.forEach(t => {
    let g = currentTorneo.formato === 'UNICO' ? 'UNICO' : (t.girone || 'A');
    if(!groups[g]) groups[g] = {};
    groups[g][t.nome] = { nome: t.nome, punti: 0, giocate: 0, vinte: 0, pareggiate: 0, perse: 0 };
  });

  let history = [];
  let fasiFinali = {};

  allMatches.forEach(p => {
    let hasScore = (p.gol_a !== "" && p.gol_b !== "" && p.gol_a !== null);
    let isKnockout = !['A','B','C','D','UNICO','CAMPIONATO'].includes(p.girone_fase.toUpperCase());

    if(hasScore) {
      history.push(p);

      if(!isKnockout) {
        let gKey = currentTorneo.formato === 'UNICO' ? 'UNICO' : p.girone_fase;
        if(groups[gKey] && groups[gKey][p.squadra_a] && groups[gKey][p.squadra_b]) {
          let gA = parseInt(p.gol_a); let gB = parseInt(p.gol_b);
          let sqA = groups[gKey][p.squadra_a]; let sqB = groups[gKey][p.squadra_b];
          
          sqA.giocate++; sqB.giocate++;
          if(gA > gB) { sqA.punti += 3; sqA.vinte++; sqB.perse++; }
          else if(gB > gA) { sqB.punti += 3; sqB.vinte++; sqA.perse++; }
          else { sqA.punti += 1; sqA.pareggiate++; sqB.punti += 1; sqB.pareggiate++; }
        }
      } else {
        if(!fasiFinali[p.girone_fase]) fasiFinali[p.girone_fase] = [];
        fasiFinali[p.girone_fase].push(p);
      }
    } else if (isKnockout) {
        if(!fasiFinali[p.girone_fase]) fasiFinali[p.girone_fase] = [];
        fasiFinali[p.girone_fase].push(p);
    }
  });

  let classificheHtml = '';
  for(let g in groups) {
    let arr = Object.values(groups[g]).sort((a,b) => b.punti - a.punti);
    if(arr.length === 0) continue;
    
    let titleStr = currentTorneo.formato === 'UNICO' ? 'Classifica Campionato' : `Girone ${g}`;
    let rows = arr.map((t, idx) => `<tr><td style="font-weight:600;">${idx + 1}. ${t.nome}</td><td class="pt">${t.punti}</td><td>${t.giocate}</td><td>${t.vinte}</td><td>${t.pareggiate}</td><td>${t.perse}</td></tr>`).join('');
    classificheHtml += `<div class="girone-box"><div class="girone-title">${titleStr}</div><div class="table-container"><table><thead><tr><th>Squadra</th><th>PT</th><th>G</th><th>V</th><th>P</th><th>S</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }
  document.getElementById('gironiContainer').innerHTML = classificheHtml || `<p style="color:var(--muted);text-align:center;">Nessuna squadra trovata</p>`;

  let order = ["OTTAVI", "QUARTI", "SEMIFINALE", "SEMIFINALI", "FINALE 3/4", "FINALE"];
  let stageKeys = Object.keys(fasiFinali).sort((a,b) => {
    let iA = order.indexOf(a.toUpperCase()); let iB = order.indexOf(b.toUpperCase());
    return (iA === -1 ? 99 : iA) - (iB === -1 ? 99 : iB);
  });
  
  if (stageKeys.length === 0) {
      document.getElementById('knockoutContainer').innerHTML = `<p style="color:var(--muted);text-align:center;font-size:12px;">Tabellone in attesa.</p>`;
  } else {
      let koHtml = '';
      stageKeys.forEach(stage => {
        koHtml += `<div class="girone-title" style="color:var(--yellow); border-bottom-color:var(--yellow); margin-top:20px; font-size:18px;">${stage}</div>`;
        fasiFinali[stage].forEach(p => koHtml += renderMatchHistoryCard(p));
      });
      document.getElementById('knockoutContainer').innerHTML = koHtml;
  }

  history.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  if(history.length === 0) document.getElementById('historyList').innerHTML = `<p style="color:var(--muted);text-align:center;font-size:12px;">Nessuna partita giocata</p>`;
  else document.getElementById('historyList').innerHTML = history.map(p => renderMatchHistoryCard(p)).join('');
}

function renderMatchHistoryCard(p) {
  let hasScore = (p.gol_a !== "" && p.gol_b !== "" && p.gol_a !== null);
  let isLive = p.stato === 'LIVE';
  let badgeLive = isLive ? `<span class="live-badge" style="margin-left:8px;">LIVE</span>` : '';
  
  let scorersHtml = (hasScore && (p.marcatori_a || p.marcatori_b)) ? `<div class="scorers-row" style="margin-top:8px;"><div class="scorer-left">${formatMarcatori(p.marcatori_a, 'A')}</div><div class="scorer-right">${formatMarcatori(p.marcatori_b, 'B')}</div></div>` : '';
  let noteHtml = (hasScore && p.note) ? `<div class="match-note" style="margin-top:8px;">📌 ${p.note.replace(/\n/g, '<br>')}</div>` : '';
  
  let phaseStr = p.girone_fase === 'UNICO' ? 'Campionato' : p.girone_fase;
  
  return `<div class="history-card">
    <div class="history-date"><span>${phaseStr} | ${p.data} - Ore ${p.orario}</span>${badgeLive}</div>
    <div class="history-score">${p.squadra_a} <span style="color:var(--green); margin:0 5px;">${hasScore ? p.gol_a + ' - ' + p.gol_b : 'VS'}</span> ${p.squadra_b}</div>
    ${scorersHtml}${noteHtml}
  </div>`;
}

function renderMarcatoriClassifica() {
  let scorerCounts = {};
  allMatches.forEach(m => {
    if (m.gol_a !== "" && m.gol_b !== "" && m.gol_a !== null) {
      let mA = m.marcatori_a ? m.marcatori_a.split('\n') : [];
      let mB = m.marcatori_b ? m.marcatori_b.split('\n') : [];
      let allScorers = mA.concat(mB);

      allScorers.forEach(entry => {
        entry = entry.trim();
        if (entry !== "") {
          let match = entry.match(/^(.*?)(?:\s*[xX*]\s*(\d+))?$/);
          let name = match[1].trim();
          let count = match[2] ? parseInt(match[2], 10) : 1;

          if (name !== "") {
            let normalized = name.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
            if (!scorerCounts[normalized]) scorerCounts[normalized] = 0;
            scorerCounts[normalized] += count;
          }
        }
      });
    }
  });

  let scorersArray = Object.keys(scorerCounts).map(name => { return { nome: name, gol: scorerCounts[name] }; });
  scorersArray.sort((a, b) => b.gol - a.gol || a.nome.localeCompare(b.nome));

  const tbody = document.getElementById('marcatoriBody');
  if (scorersArray.length === 0) {
    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:var(--muted); padding:15px;">Nessun gol segnato finora</td></tr>`;
    return;
  }
  tbody.innerHTML = scorersArray.map((s, idx) => `<tr><td style="font-weight:600;">${idx + 1}. ${s.nome}</td><td class="pt">${s.gol}</td></tr>`).join('');
}

// === GESTIONE AUTENTICAZIONE E SALVATAGGIO TRAMITE RPC (SICURO) ===
function toggleAuth() {
  if (adminPin) {
    if(confirm("Vuoi uscire dalla modalità Organizzatore?")) {
      adminPin = null; sessionStorage.removeItem('adminPin');
      updateAuthIcon(); renderCurrentDay(); showToast("Uscito dalla modalità Organizzatore");
    }
  } else {
    let pin = prompt("Inserisci il PIN ORGANIZZATORE per i risultati:");
    if (!pin) return;
    
    // Il controllo avviene dento Supabase, noi non conosciamo il PIN reale!
    fetch(`${SUPABASE_URL}/rest/v1/rpc/login_org`, { 
      method: 'POST', 
      headers: HEADERS, 
      body: JSON.stringify({ p_slug: currentTorneo.slug, p_pin: pin }) 
    })
    .then(res => res.json())
    .then(valid => {
      if(valid) {
        adminPin = pin; sessionStorage.setItem('adminPin', pin);
        updateAuthIcon(); renderCurrentDay(); showToast("Modalità Organizzatore attivata!");
      } else {
        showToast("PIN Errato!", true);
      }
    })
    .catch(() => showToast("Errore di verifica", true));
  }
}

function openMatch(index) {
  currentMatch = matches[index];
  let turnoTesto = ['A', 'B', 'C', 'D', 'UNICO'].includes(currentMatch.girone_fase) ? `Fase: ${currentMatch.girone_fase}` : currentMatch.girone_fase;
  
  document.getElementById('resultTeams').textContent = `${currentMatch.squadra_a} VS ${currentMatch.squadra_b}`;
  document.getElementById('resultOrario').textContent = `${turnoTesto} - ${currentMatch.data || 'TBD'} - Ore ${currentMatch.orario || 'TBD'}`;
  document.getElementById('scoreTeamA').textContent = currentMatch.squadra_a; document.getElementById('scoreTeamB').textContent = currentMatch.squadra_b;
  
  document.getElementById('matchStatus').value = currentMatch.stato || 'DA_GIOCARE';
  document.getElementById('scoreA').value = currentMatch.gol_a !== "" ? currentMatch.gol_a : 0;
  document.getElementById('scoreB').value = currentMatch.gol_b !== "" ? currentMatch.gol_b : 0;
  document.getElementById('marcatoriA').value = currentMatch.marcatori_a || ''; document.getElementById('marcatoriB').value = currentMatch.marcatori_b || '';
  document.getElementById('notePartita').value = currentMatch.note || '';
  
  switchTab('resultScreen');
}

function submitResult() {
  if(!adminPin) return;
  const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = '⏳ Salvataggio...';
  
  const payload = {
    p_partita_id: currentMatch.id,
    p_pin: adminPin,
    p_stato: document.getElementById('matchStatus').value,
    p_gola: document.getElementById('scoreA').value, 
    p_golb: document.getElementById('scoreB').value,
    p_marca: document.getElementById('marcatoriA').value.trim(), 
    p_marcb: document.getElementById('marcatoriB').value.trim(), 
    p_note: document.getElementById('notePartita').value.trim()
  };

  // Chiama il buttafuori "salva_risultato"
  fetch(`${SUPABASE_URL}/rest/v1/rpc/salva_risultato`, {
    method: 'POST',
    headers: HEADERS,
    body: JSON.stringify(payload)
  })
  .then(res => {
    if(!res.ok) throw new Error("Errore Auth");
    btn.disabled = false; btn.textContent = '📤 SALVA RISULTATO';
    showToast("Risultato salvato!");
    return fetch(`${SUPABASE_URL}/rest/v1/partite?torneo_id=eq.${currentTorneo.id}`, { headers: HEADERS }).then(r=>r.json());
  })
  .then(partite => {
    allMatches = partite; switchTab('homeScreen'); processDates();
  })
  .catch(err => {
    btn.disabled = false; btn.textContent = '📤 SALVA RISULTATO'; showToast('❌ PIN Non più valido o errore', true);
  });
}

function formatMarcatori(text, side) {
  if (!text) return '';
  return text.split('\n').filter(line => line.trim() !== '').map(line => side === 'A' ? `⚽ ${line.trim()}` : `${line.trim()} ⚽`).join('<br>');
}
function setupSwipe() {
  const swipeZone = document.getElementById('homeScreen'); let touchstartX = 0; let touchendX = 0;
  swipeZone.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
  swipeZone.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX; const threshold = 50; 
    if (document.getElementById('homeScreen').classList.contains('active')) {
      if (touchendX < touchstartX - threshold) changeDay(1); 
      if (touchendX > touchstartX + threshold) changeDay(-1); 
    }
  }, {passive: true});
}
function updateAuthIcon() {
  const btn = document.getElementById('lockBtn');
  if (adminPin) { btn.innerText = "🔓"; btn.style.borderColor = "var(--green)"; btn.style.color = "var(--green)"; } 
  else { btn.innerText = "🔒"; btn.style.borderColor = "var(--border)"; btn.style.color = "var(--text)"; }
}
function switchTab(screenId) {
  if(['homeScreen', 'classificaScreen', 'marcatoriScreen'].includes(screenId)) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    
    if(screenId === 'homeScreen') { document.getElementById('tab-partite').classList.add('active'); renderCurrentDay(); } 
    else if (screenId === 'classificaScreen') { document.getElementById('tab-classifica').classList.add('active'); loadStandings(); } 
    else if (screenId === 'marcatoriScreen') { document.getElementById('tab-marcatori').classList.add('active'); renderMarcatoriClassifica(); }
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  window.scrollTo(0, 0);
}
function showToast(msg, isError = false) {
  const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${isError ? 'error' : ''} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
